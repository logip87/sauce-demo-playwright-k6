name: e2e

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Playwright tests
        run: npm run e2e:test
        env:
          CI: 'true'

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e/artifacts
          if-no-files-found: warn

  publish-allure:
    if: always() && github.event_name != 'pull_request'
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout existing Pages branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: .gh-pages

      - name: Initialize Pages cache branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .gh-pages
          if [ ! -d .gh-pages/.git ]; then
            git init .gh-pages
            git -C .gh-pages checkout --orphan gh-pages
          fi
          git -C .gh-pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git -C .gh-pages remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download e2e artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e/artifacts

      - name: Restore Allure history
        shell: bash
        run: |
          node scripts/prepare-allure-history.mjs \
            --pages-dir .gh-pages \
            --archive-dir .allure-pages-state \
            --history-path e2e/artifacts/allure-history/history.jsonl \
            --repository "${GITHUB_REPOSITORY}"

      - name: Generate Allure report
        run: npm run allure:generate --workspace e2e

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          mkdir -p site
          if [ -d .gh-pages/lt ]; then
            mkdir -p site/lt
            cp -R .gh-pages/lt/. site/lt/
          fi
          node scripts/publish-allure-site.mjs \
            --site-dir site \
            --pages-dir .gh-pages \
            --archive-dir .allure-pages-state \
            --report-dir e2e/artifacts/allure-report \
            --history-path e2e/artifacts/allure-history/history.jsonl \
            --repository "${GITHUB_REPOSITORY}"
          node scripts/render-pages-index.mjs site
          touch site/.nojekyll

      - name: Update Pages cache branch
        shell: bash
        run: |
          git -C .gh-pages config user.name "github-actions[bot]"
          git -C .gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          shopt -s dotglob nullglob
          for entry in .gh-pages/*; do
            if [ "$(basename "$entry")" != ".git" ]; then
              rm -rf "$entry"
            fi
          done
          cp -R site/. .gh-pages/
          git -C .gh-pages add --all
          if git -C .gh-pages diff --cached --quiet; then
            echo "Pages cache already up to date."
          else
            git -C .gh-pages commit -m "chore: sync pages cache"
            git -C .gh-pages push origin HEAD:gh-pages
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages artifact
        id: deploy
        uses: actions/deploy-pages@v4
